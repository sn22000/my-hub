name: Fetch SEO News

on:
  schedule:
    - cron: '45 22 * * *'   # 07:45 JST
    - cron: '45 4 * * *'    # 13:45 JST
    - cron: '45 12 * * *'   # 21:45 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch SEO News
        run: python scripts/fetch-seo.py
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seo-news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update SEO news data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
