name: Fetch Stock Data

on:
  schedule:
    # Run 4 times daily (markets open/close): 8:00, 12:00, 18:00, 23:00 JST
    - cron: '0 23 * * 1-5'   # 08:00 JST (weekdays)
    - cron: '0 3 * * 1-5'    # 12:00 JST
    - cron: '0 9 * * 1-5'    # 18:00 JST
    - cron: '0 14 * * 1-5'   # 23:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance -q

      - name: Fetch Stock Data
        run: python scripts/fetch-stocks.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks-*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update stock data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
