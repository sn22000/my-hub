name: Fetch Finance News

on:
  schedule:
    # Run 3 times daily: 7:30 JST, 13:30 JST, 21:30 JST (offset from AI fetch)
    - cron: '30 22 * * *'   # 07:30 JST
    - cron: '30 4 * * *'    # 13:30 JST
    - cron: '30 12 * * *'   # 21:30 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Finance News
        run: python scripts/fetch-finance.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/finance-news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update finance news data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
