name: Fetch Economics News

on:
  schedule:
    # Run 3 times daily: 8:00 JST, 14:00 JST, 22:00 JST (offset from AI/Finance)
    - cron: '0 23 * * *'    # 08:00 JST
    - cron: '0 5 * * *'     # 14:00 JST
    - cron: '0 13 * * *'    # 22:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Economics News
        run: python scripts/fetch-economics.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/economics-news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update economics news data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
