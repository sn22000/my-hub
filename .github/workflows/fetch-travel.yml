name: Fetch Travel News

on:
  schedule:
    - cron: '15 22 * * *'   # 07:15 JST
    - cron: '15 4 * * *'    # 13:15 JST
    - cron: '15 12 * * *'   # 21:15 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Travel News
        run: python scripts/fetch-travel.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/travel-news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update travel news data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
