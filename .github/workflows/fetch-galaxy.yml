name: Fetch Galaxy News

on:
  schedule:
    - cron: '10 23 * * *'   # 08:10 JST
    - cron: '10 5 * * *'    # 14:10 JST
    - cron: '10 13 * * *'   # 22:10 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch Galaxy News
        run: python scripts/fetch-galaxy.py
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/galaxy-news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update galaxy news data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
