name: Fetch Game News

on:
  schedule:
    - cron: '30 23 * * *'   # 08:30 JST
    - cron: '30 5 * * *'    # 14:30 JST
    - cron: '30 13 * * *'   # 22:30 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch Game News
        run: python scripts/fetch-game.py
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/game-news.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update game news data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
